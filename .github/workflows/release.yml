name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  packaging-debian:
    runs-on: ubuntu-24.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential devscripts dh-make dh-dkms dkms
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: i915-sriov-dkms
      - name: Packaging
        working-directory: i915-sriov-dkms
        run: |
          LATEST_VERSION=$(grep "^PACKAGE_VERSION" "dkms.conf" | sed 's/.*\?"\([^"]*\)".*/\1/')
          sed -i "s/###LATEST_VERSION###/$LATEST_VERSION/g" debian/control debian/changelog
          dpkg-buildpackage -b -tc -us -uc
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debain-package
          path: "*.deb"

  packaging-archlinux:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Install Dependencies
        run: |
          pacman-key --init
          pacman -Syu --noconfirm git dkms
          useradd -m user
          sed -i 's/COMPRESSZST=.*/COMPRESSZST=(zstd -c -T0 --ultra -22 -)/' /etc/makepkg.conf
          echo "user ALL=(ALL:ALL) NOPASSWD: ALL" >> /etc/sudoers
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: i915-sriov-dkms
      - name: Packaging
        working-directory: i915-sriov-dkms
        run: |
          chown -R user: .
          sudo -u user makepkg -s --noconfirm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "i915-sriov-dkms/*.pkg*"
  
  release:
    runs-on: ubuntu-24.04
    needs: [packaging-debian, packaging-archlinux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Get version from dkms.conf
        id: get_version
        run: |
          LATEST_VERSION=$(grep "^PACKAGE_VERSION" "dkms.conf" 2>/dev/null || echo "0.0.1")
          LATEST_VERSION=$(echo "$LATEST_VERSION" | sed 's/.*\?"\([^"]*\)".*/\1/')
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$LATEST_VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: |
            *.pkg*
            *.deb
          draft: false
          prerelease: false
